services:
  sanemail:
    build: .
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      APP_ORIGIN: http://localhost:3000
      WEB_ORIGIN: http://localhost:3000
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sanemail}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_SHADOW_DB: ${POSTGRES_SHADOW_DB:-sanemail_shadow}
      POSTGRES_ROOT_DB: ${POSTGRES_ROOT_DB:-postgres}
      SHADOW_DATABASE_URL: ${SHADOW_DATABASE_URL:-}
      ROOT_DATABASE_URL: ${ROOT_DATABASE_URL:-}
      QUEUE_DATABASE_URL: ${QUEUE_DATABASE_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/google/callback}
      SYNC_MESSAGE_LIMIT: ${SYNC_MESSAGE_LIMIT:-50}
      SYNC_QUERY: ${SYNC_QUERY:-newer_than:90d -in:chats}
      QUEUE_DRIVER: ${QUEUE_DRIVER:-local-json}
      QUEUE_POLL_INTERVAL_MS: ${QUEUE_POLL_INTERVAL_MS:-1000}
      CLASSIFICATION_BATCH_SIZE: ${CLASSIFICATION_BATCH_SIZE:-25}
    volumes:
      - sanemail-data:/data

volumes:
  sanemail-data:
